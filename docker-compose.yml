services:
  mongodb:
    image: mongo:7
    container_name: docflow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - docflow-mongodb:/data/db

  minio:
    image: minio/minio:latest
    container_name: docflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - docflow-minio:/data

volumes:
  docflow-mongodb:
  docflow-minio:
